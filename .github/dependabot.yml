version: 2
updates:
  # npm dependencies — direct + transitive (overrides honored)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    labels:
      - dependencies

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(ci)'
      include: scope
    labels:
      - dependencies
      - ci
